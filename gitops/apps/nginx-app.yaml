apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd
spec:
  project: minju
  source:
    repoURL: https://github.com/minju2022039105/aws-devsecops-platform
    targetRevision: main
    path: kubernetes-extension/k8s/nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
