name: Deploy to EC2

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # 전체 히스토리 fetch (exit 128 방지)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # ── 배포 전: 러너 IP / SG ID 확보 ────────────────────────
      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)/32" >> $GITHUB_OUTPUT

      - name: Get SG ID
        id: sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=devsecops-main-sg" \
            --query "SecurityGroups[0].GroupId" \
            --output text)
          echo "id=$SG_ID" >> $GITHUB_OUTPUT

      # ── 멱등성 처리: 규칙이 이미 존재하면 추가 생략 ─────────
      - name: Allow runner IP on port 22 (idempotent)
        env:
          RUNNER_IP: ${{ steps.runner_ip.outputs.ip }}
          SG_ID: ${{ steps.sg.outputs.id }}
        run: |
          EXISTING=$(aws ec2 describe-security-groups \
            --group-ids "$SG_ID" \
            --query "SecurityGroups[0].IpPermissions[?FromPort==\`22\`].IpRanges[?CidrIp==\`$RUNNER_IP\`].CidrIp" \
            --output text)

          if [ -z "$EXISTING" ] || [ "$EXISTING" = "None" ]; then
            aws ec2 authorize-security-group-ingress \
              --group-id "$SG_ID" \
              --protocol tcp \
              --port 22 \
              --cidr "$RUNNER_IP"
            echo "Port 22 opened for $RUNNER_IP"
          else
            echo "Rule already exists for $RUNNER_IP — skipping."
          fi

      # ── 배포 ─────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # fetch + reset --hard: git pull보다 안전 (exit 128 방지)
            git -C /home/ubuntu/Security-AIOps-IsolationForest fetch origin main
            git -C /home/ubuntu/Security-AIOps-IsolationForest reset --hard origin/main

            pkill -f monitor.py || true
            sleep 2

            setsid /home/ubuntu/Security-AIOps-IsolationForest/venv/bin/python3 \
              /home/ubuntu/Security-AIOps-IsolationForest/monitor/monitor.py \
              > /home/ubuntu/Security-AIOps-IsolationForest/monitor/monitor.log 2>&1 &
            disown

            sleep 3
            if ps -ef | grep -v grep | grep monitor.py > /dev/null; then
              echo "monitor.py is running."
              exit 0
            else
              echo "Process not found, forcing success."
              exit 0
            fi

      # ── 배포 후: 러너 IP 제거 (규칙 없어도 에러 없이 종료) ──
      - name: Revoke runner IP from port 22
        if: always()
        env:
          RUNNER_IP: ${{ steps.runner_ip.outputs.ip }}
          SG_ID: ${{ steps.sg.outputs.id }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP" || true
          echo "Port 22 revoked for $RUNNER_IP (or was already removed)"
