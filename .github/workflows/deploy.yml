name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VAR_account_id:      ${{ secrets.AWS_ACCOUNT_ID }}
  TF_VAR_s3_bucket_name:  ${{ secrets.S3_BUCKET_NAME }}
  TF_VAR_kms_key_arn:     ${{ secrets.KMS_KEY_ARN }}
  TF_VAR_waf_ipset_arn:   ${{ secrets.WAF_IPSET_ARN }}
  TF_VAR_domain_name:     "minju-devsec.store"
  TF_VAR_route53_zone_id: ${{ secrets.ROUTE53_ZONE_ID }}
  TF_VAR_alert_email:     ${{ secrets.ALERT_EMAIL }}
  TF_VAR_my_ip:           '["0.0.0.0/0"]'

# ──────────────────────────────────────────────────────────────────────
# Job 1: 보안 게이트 — Trivy IaC + Bandit Python
# ──────────────────────────────────────────────────────────────────────
jobs:
  security-scan:
    name: Security Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy IaC Scan (HIGH/CRITICAL 차단)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./infra
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Bandit Python Scan
        run: |
          pip install bandit -q
          bandit -r ./ai ./lambda ./monitoring -ll --exit-zero

# ──────────────────────────────────────────────────────────────────────
# Job 2: Terraform Plan/Apply
# ──────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color 2>&1 | tee $GITHUB_WORKSPACE/plan_output.txt
          exit ${PIPESTATUS[0]}

      - name: PR에 Plan 결과 코멘트
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(process.env.GITHUB_WORKSPACE + '/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

# ──────────────────────────────────────────────────────────────────────
# Job 3: Lambda 코드 배포 (main push 전용)
# ──────────────────────────────────────────────────────────────────────
  deploy-lambda:
    name: Deploy Lambda
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy SecurityAnalyzer
        run: |
          cd lambda/analyzer
          zip -r analyzer.zip .
          aws lambda update-function-code \
            --function-name SecurityAnalyzer \
            --zip-file fileb://analyzer.zip

      - name: Deploy SecurityPreventer
        run: |
          cd lambda/preventer
          zip -r preventer.zip .
          aws lambda update-function-code \
            --function-name SecurityPreventer \
            --zip-file fileb://preventer.zip

      - name: Deploy NormalTrafficGenerator
        run: |
          cd lambda/traffic_generator
          zip -r traffic_generator.zip .
          aws lambda update-function-code \
            --function-name NormalTrafficGenerator \
            --zip-file fileb://traffic_generator.zip
