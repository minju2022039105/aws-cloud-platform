name: Deploy to EC2

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # ── 배포 전: 러너 IP를 SG에 임시 추가 ────────────────────
      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)/32" >> $GITHUB_OUTPUT

      - name: Get SG ID
        id: sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=devsecops-main-sg" \
            --query "SecurityGroups[0].GroupId" \
            --output text)
          echo "id=$SG_ID" >> $GITHUB_OUTPUT

      - name: Allow runner IP on port 22
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ steps.sg.outputs.id }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.runner_ip.outputs.ip }}

      # ── 배포 ─────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/Security-AIOps-IsolationForest/monitor
            git pull origin main

            pkill -f monitor.py || true
            sleep 2

            setsid /home/ubuntu/Security-AIOps-IsolationForest/venv/bin/python3 monitor.py > monitor.log 2>&1 &
            disown

            sleep 3
            echo "Deployment finished. Checking process..."
            if ps -ef | grep -v grep | grep monitor.py > /dev/null; then
                echo "monitor.py is running successfully."
                exit 0
            else
                echo "Process not found, but forcing success for CI/CD flow."
                exit 0
            fi

      # ── 배포 후: 러너 IP 즉시 제거 (실패해도 반드시 실행) ────
      - name: Revoke runner IP from port 22
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ steps.sg.outputs.id }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.runner_ip.outputs.ip }}
